server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI OpenAI 配置（DeepSeek 兼容接口）
spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  mvc:
    async:
      request-timeout: 30000
  jackson:
    default-property-inclusion: non_null
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 1
          top-p: 0.95
          max-tokens: 8192
    
    # Spring AI MCP 客户端配置
    # 需要腾讯云 MCP 服务时设为 true，并配置 TENCENT_MCP_SSE_ENDPOINT 环境变量
    mcp:
      client:
        enabled: false
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: ${TENCENT_MCP_SSE_ENDPOINT}  # 从环境变量读取
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${Ali-Key}  # 从环境变量读取或使用默认值（用于自定义配置）
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# 模型配置（统一管理所有模型）
model:
  chat-model: "deepseek-chat"              # 普通对话用的模型
  rag-model: "deepseek-chat"    # RAG 检索和生成用的模型
  aiops-model: "deepseek-chat"             # AI Ops 告警分析用的模型
  aiops-supervisor-model: "deepseek-chat"  # Supervisor 路由决策
  embedding-model: "text-embedding-v4"  # 向量嵌入模型（保持 DashScope）

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: true  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: true  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

memory:
  hooks:
    enabled: true                  # 是否启用记忆 Hooks
    recall:
      top-k: 3                     # 长期记忆召回条数
      max-context-length: 1500     # 注入系统上下文的最大长度
    persist:
      async: true                  # 是否异步持久化记忆
  short-term:
    max-window-size: 6              # 短期记忆最大窗口大小（轮数）
    session-ttl: 3600              # 会话过期时间（秒）
    enable-redis: true             # 是否启用 Redis 持久化
  long-term:
    enable-auto-save: true         # 是否自动保存对话到长期记忆
    save-threshold: 3              # 超过多少轮对话后自动保存
    importance-threshold: 0.7       # 重要性评分阈值
    content-max-length: 8192        # 与 Milvus content 字段 max_length 保持一致
  compression:
    threshold: 10                   # 超过多少轮对话后开始压缩
  markdown:
    enabled: true                  # 是否启用 Markdown 记忆系统
    root: "${user.home}/.agent-memory"  # 记忆文件存储根目录
    recall:
      enabled: true                # 是否启用记忆召回 Hook
      max-context-length: 3000     # 召回的最大上下文长度
    persist:
      enabled: true                # 是否启用记忆持久化 Hook
      min-messages: 3              # 触发持久化的最小消息数

# 上下文工程配置
context:
  budget:
    enabled: true                  # 是否启用 Token 预算管理
    max-tokens: 8000               # 最大上下文 Token 数
    system-prompt-weight: 0.15     # 系统提示词权重
    rag-weight: 0.25               # RAG 结果权重
    memory-weight: 0.15            # 记忆上下文权重
    conversation-weight: 0.30      # 对话历史权重
    user-input-weight: 0.15        # 用户输入权重
  compression:
    enabled: true                  # 是否启用上下文压缩
    conversation-summary-threshold: 10  # 对话轮数超过此阈值时生成摘要
  templates:
    enabled: true                  # 是否启用 Prompt 模板引擎
    location: classpath:prompts/templates.yml  # 模板配置文件位置
  rag:
    enabled: true                  # 是否启用上下文感知 RAG
    rewrite:
      enabled: true                # 是否启用查询改写
    entity-extraction:
      enabled: true                # 是否启用实体提取
  user-profile:
    enabled: true                  # 是否启用用户画像注入
    max-length: 500                # 用户画像最大长度

# 限流配置
rate-limit:
  enabled: true                      # 是否启用限流
  per-ip-per-minute: 10              # 单 IP 每分钟最大请求数
  global-per-second: 5               # 全局每秒最大请求数
  daily-token-budget: 1000000        # 每日 Token 总预算
  per-user-daily: 50000              # 单用户每日 Token 限额
  alert-threshold: 0.8               # Token 消耗告警阈值（80%）
  auto-ban-threshold: 50             # 自动封禁阈值（5 分钟内调用次数）

# 安全认证
security:
  jwt:
    secret: "${JWT_SECRET:SuperBizAgentDefaultSecretKey2026!PleaseChangeThisInProduction}"
    expiration: 86400000            # Token 有效期 24 小时（毫秒）
  admin:
    username: "${ADMIN_USERNAME:admin}"
    password: "${ADMIN_PASSWORD:admin123}"
